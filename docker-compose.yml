services:
  postgres:
    image: postgres:17-alpine
    container_name: pdv-postgres
    environment:
      POSTGRES_DB: pdv
      POSTGRES_USER: pdv
      POSTGRES_PASSWORD: pdv123
    ports:
      - "5432:5432"
    volumes:
      - pdv_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdv -d pdv"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pdv_postgres_data:
